services:
  - type: web
    name: laravel-web
    env: php                     # **bắt buộc** chọn PHP, không phải Docker
    plan: free
    branch: main
    buildCommand:               # build Laravel
      composer install --no-dev --optimize-autoloader
      npm install && npm run production
      php artisan migrate --force
      php artisan storage:link
    startCommand:               # server sẽ nghe đúng port do Render cấp
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromSecret: LARAVEL_APP_KEY
      - key: DATABASE_URL
        fromDatabase: laravel-db
databases:
  - name: laravel-db
    engine: postgresql
    version: "13"
    plan: free
