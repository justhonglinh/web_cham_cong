services:
  - type: web
    name: web-cham-cong
    env: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan migrate --force
      php artisan storage:link
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan optimize
      php artisan event:cache
      php artisan package:discover
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: ${LARAVEL_APP_KEY}
      - key: APP_URL
        value: https://web-cham-cong.onrender.com
      - key: DATABASE_URL
        fromDatabase: laravel-db
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: pgsql
      - key: VIEW_COMPILED_PATH
        value: /tmp
      - key: CACHE_PATH
        value: /tmp
      - key: SESSION_PATH
        value: /tmp
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: laravel-db
    databaseName: web_cham_cong
    user: web_cham_cong_user
